# Focused sweep: tighter ranges around the area of interest identified
# from the 500-point random sweep.
#
# Key findings:
#   w_dwa        → low is better (< 0.30)
#   w_soc_title  → peaks around 0.40–0.65
#   w_isco/task/occ → flat (wide range OK)
#   min_sim      → slight peak near 0.43–0.52
#   margin_best  → flat, no signal
#   max_links    → 1–2 score better; 3+ hurts composite score

seed: 99
n: 500
parameters:
  - parameter: w_dwa
    range: [0.0, 0.30]
    kind: float
  - parameter: w_soc_title
    range: [0.30, 0.70]
    kind: float
  - parameter: w_isco
    range: [0.0, 1.0]
    kind: float
  - parameter: w_isco_task
    range: [0.0, 1.0]
    kind: float
  - parameter: w_occ
    range: [0.50, 1.0]
    kind: float
  - parameter: min_sim
    range: [0.38, 0.54]
    kind: float
  - parameter: margin_best
    range: [0.00, 0.06]
    kind: float
  - parameter: max_links_per_task
    range: [1, 3]
    kind: int
  - parameter: overload_quantile
    range: [0.90, 0.99]
    kind: float
  - parameter: overload_abs
    range: [100, 300]
    kind: int
  - parameter: overload_min_sim
    range: [0.45, 0.60]
    kind: float
  - parameter: overload_margin_best
    range: [0.00, 0.03]
    kind: float
